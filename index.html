<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Calculator</title>

  <link rel="apple-touch-icon" href="https://china-xxoo.github.io/vx/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="https://china-xxoo.github.io/vx/apple-touch-icon.png" />
  <link rel="apple-touch-icon-precomposed" href="https://china-xxoo.github.io/vx/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="https://china-xxoo.github.io/vx/apple-touch-icon.png" />

  <meta name="theme-color" content="#111827" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Calculator" />

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111827;
      color: #fff;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .app {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background:
        radial-gradient(circle at top, rgba(55, 65, 81, 0.92), transparent 34%),
        radial-gradient(circle at bottom, rgba(15, 23, 42, 1), #020617 72%);
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      object-fit: cover;
      box-shadow: 0 18px 44px rgba(0,0,0,0.35);
      margin-bottom: 22px;
      background: #111827;
    }

    .title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .sub-title {
      font-size: 13px;
      color: rgba(255,255,255,0.62);
      margin-bottom: 28px;
      text-align: center;
      line-height: 1.5;
    }

    .status-card {
      width: min(92vw, 390px);
      border-radius: 28px;
      padding: 24px 20px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 24px 80px rgba(0,0,0,0.28);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-align: center;
    }

    .big-dot {
      width: 78px;
      height: 78px;
      border-radius: 999px;
      margin: 4px auto 18px;
      background: #ef4444;
      box-shadow: 0 0 34px rgba(239,68,68,0.75);
      transition: 0.25s ease;
    }

    .big-dot.green {
      background: #22c55e;
      box-shadow: 0 0 38px rgba(34,197,94,0.82);
    }

    .big-dot.yellow {
      background: #f59e0b;
      box-shadow: 0 0 38px rgba(245,158,11,0.82);
    }

    .status-text {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .status-desc {
      min-height: 42px;
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.68);
      word-break: break-all;
    }

    .mini-row {
      margin-top: 18px;
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 999px;
      padding: 12px 14px;
      color: #111827;
      background: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.98);
      opacity: 0.86;
    }

    .log {
      width: min(92vw, 390px);
      height: 112px;
      margin-top: 14px;
      padding: 12px;
      overflow-y: auto;
      border-radius: 18px;
      background: rgba(0,0,0,0.24);
      color: rgba(255,255,255,0.68);
      font-size: 12px;
      line-height: 1.45;
      text-align: left;
      overscroll-behavior: contain;
    }
  </style>
</head>

<body>
  <div class="app">
    <img class="logo" src="https://china-xxoo.github.io/vx/apple-touch-icon.png" alt="logo" />

    <div class="title">Cloudflare 后台检测</div>
    <div class="sub-title">GitHub Pages 打开页面，实时检测手机能不能连接 Cloudflare Worker。</div>

    <div class="status-card">
      <div class="big-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">后台未连接</div>
      <div class="status-desc" id="statusDesc">等待连接...</div>

      <div class="mini-row">
        <button class="btn" onclick="reconnectNow()">重新连接</button>
      </div>
    </div>

    <div class="log" id="logBox"></div>
  </div>

  <script>
    const CF_WS_URL = "wss://vx-notify-2026.appleloveword4.workers.dev/ws";
    const CF_TOKEN = "vx_notify_2026_private_key";

    let ws = null;
    let reconnectTimer = null;
    let heartbeatTimer = null;
    let lastPongAt = 0;

    function log(text) {
      const box = document.getElementById("logBox");
      const time = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      box.innerHTML = `[${time}] ${text}<br>` + box.innerHTML;
    }

    function setStatus(type, desc) {
      const dot = document.getElementById("statusDot");
      const text = document.getElementById("statusText");
      const descEl = document.getElementById("statusDesc");

      dot.className = "big-dot";

      if (type === "connected") {
        dot.classList.add("green");
        text.textContent = "后台已连接";
        descEl.textContent = desc || "WebSocket 已连接，Cloudflare 后台可用。";
        return;
      }

      if (type === "connecting") {
        dot.classList.add("yellow");
        text.textContent = "后台连接中";
        descEl.textContent = desc || "正在连接 Cloudflare Worker...";
        return;
      }

      text.textContent = "后台未连接";
      descEl.textContent = desc || "当前设备无法实时连接 Cloudflare 后台。";
    }

    function clearTimers() {
      clearTimeout(reconnectTimer);
      clearInterval(heartbeatTimer);
      reconnectTimer = null;
      heartbeatTimer = null;
    }

    function connectBackend() {
      clearTimers();
      setStatus("connecting");
      log("开始连接：" + CF_WS_URL);

      try {
        ws = new WebSocket(CF_WS_URL);
      } catch (e) {
        setStatus("disconnected", "WebSocket 创建失败：" + e.message);
        log("创建失败：" + e.message);
        scheduleReconnect();
        return;
      }

      ws.onopen = function () {
        lastPongAt = Date.now();
        log("WebSocket 已打开，发送认证...");
        ws.send(JSON.stringify({ type: "auth", token: CF_TOKEN }));

        heartbeatTimer = setInterval(function () {
          if (!ws || ws.readyState !== WebSocket.OPEN) return;

          if (Date.now() - lastPongAt > 16000) {
            log("心跳超时，重新连接");
            try { ws.close(); } catch (e) {}
            setStatus("disconnected", "心跳超时，正在重连...");
            scheduleReconnect();
            return;
          }

          ws.send(JSON.stringify({ type: "ping", time: Date.now() }));
        }, 5000);
      };

      ws.onmessage = function (event) {
        let msg;
        try {
          msg = JSON.parse(event.data);
        } catch (e) {
          log("收到非 JSON 数据");
          return;
        }

        if (msg.type === "hello") {
          log("收到 hello");
        }

        if (msg.type === "ready") {
          lastPongAt = Date.now();
          setStatus("connected");
          log("认证成功，后台已连接");
        }

        if (msg.type === "pong") {
          lastPongAt = Date.now();
          setStatus("connected");
          log("pong");
        }

        if (msg.type === "error") {
          setStatus("disconnected", "后台返回错误：" + (msg.message || "unknown"));
          log("错误：" + (msg.message || "unknown"));
        }
      };

      ws.onerror = function () {
        setStatus("disconnected", "连接出错。手机网络可能无法访问 workers.dev。");
        log("WebSocket error");
      };

      ws.onclose = function () {
        setStatus("disconnected", "连接已断开，5 秒后自动重连。");
        log("WebSocket close");
        scheduleReconnect();
      };
    }

    function scheduleReconnect() {
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connectBackend, 5000);
    }

    function reconnectNow() {
      clearTimers();
      if (ws) {
        try { ws.close(); } catch (e) {}
      }
      connectBackend();
    }

    document.addEventListener("visibilitychange", function () {
      if (!document.hidden) {
        reconnectNow();
      }
    });

    window.addEventListener("online", reconnectNow);

    window.addEventListener("offline", function () {
      setStatus("disconnected", "设备已离线。");
      log("offline");
    });

    document.addEventListener("touchmove", function (e) {
      e.preventDefault();
    }, { passive: false });

    connectBackend();
  </script>
</body>
</html>
