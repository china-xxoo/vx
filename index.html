<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Calculator</title>

  <link rel="manifest" href="/vx/manifest.webmanifest?v=tech-config-fixed-20260510" />
  <link rel="icon" type="image/png" sizes="192x192" href="/vx/vx-logo-192.png?v=tech-config-fixed-20260510" />
  <link rel="icon" type="image/png" sizes="512x512" href="/vx/vx-logo-512.png?v=tech-config-fixed-20260510" />
  <link rel="shortcut icon" type="image/png" href="/vx/vx-logo-192.png?v=tech-config-fixed-20260510" />
  <link rel="apple-touch-icon" href="/vx/vx-logo-180.png?v=tech-config-fixed-20260510" />
  <link rel="apple-touch-icon" sizes="180x180" href="/vx/vx-logo-180.png?v=tech-config-fixed-20260510" />
  <link rel="apple-touch-icon-precomposed" href="/vx/vx-logo-180.png?v=tech-config-fixed-20260510" />

  <meta name="theme-color" content="#020617" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Calculator" />
  <meta name="application-name" content="Calculator" />
  <meta name="format-detection" content="telephone=no" />

  <style>
    :root {
      --app-height: 100dvh;
      --visible-height: 100dvh;
      --vv-top: 0px;
      --top-safe: env(safe-area-inset-top, 0px);
      --bottom-safe: env(safe-area-inset-bottom, 0px);
      --keyboard-offset: 0px;
      --header-height: calc(58px + var(--top-safe));
      --send-height: calc(62px + var(--bottom-safe));
      --bg0: #020617;
      --bg1: #07111f;
      --line: rgba(125, 211, 252, 0.22);
      --cyan: #38bdf8;
      --blue: #2563eb;
      --violet: #8b5cf6;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e5f4ff;
      --muted: rgba(226, 232, 240, 0.66);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      background: var(--bg0);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    button,
    input {
      font-family: inherit;
    }

    .calculator {
      width: 100%;
      height: var(--app-height);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: calc(16px + var(--top-safe)) 18px calc(16px + var(--bottom-safe));
      background:
        radial-gradient(circle at 50% -10%, rgba(56, 189, 248, 0.16), transparent 38%),
        radial-gradient(circle at 15% 28%, rgba(139, 92, 246, 0.13), transparent 34%),
        radial-gradient(circle at bottom, rgba(15, 23, 42, 0.96), #020617 72%);
      color: white;
      overflow: hidden;
    }

    .display {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      font-size: 54px;
      font-weight: 300;
      padding: 28px 8px 26px;
      word-break: break-all;
      text-align: right;
      color: #f9fafb;
      text-shadow: 0 2px 18px rgba(56,189,248,0.22);
      line-height: 1.1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding-bottom: 6px;
    }

    .btn {
      height: 72px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 23px;
      font-size: 28px;
      color: #f9fafb;
      background: linear-gradient(180deg, rgba(55,65,81,0.94), rgba(15,23,42,0.96));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 10px 24px rgba(0,0,0,0.26);
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.96);
      opacity: 0.88;
    }

    .operator {
      background: linear-gradient(180deg, #f59e0b, #ea580c);
      color: white;
    }

    .function {
      background: linear-gradient(180deg, #cbd5e1, #94a3b8);
      color: #111827;
    }

    .zero {
      grid-column: span 2;
    }

    .chat-app {
      display: none;
      position: fixed;
      left: 0;
      right: 0;
      top: var(--vv-top);
      width: 100%;
      height: var(--visible-height);
      overflow: hidden;
      flex-direction: column;
      background:
        linear-gradient(rgba(56,189,248,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,0.035) 1px, transparent 1px),
        radial-gradient(circle at 12% 8%, rgba(59,130,246,0.22), transparent 30%),
        radial-gradient(circle at 88% 18%, rgba(139,92,246,0.20), transparent 32%),
        radial-gradient(circle at 50% 100%, rgba(14,165,233,0.13), transparent 38%),
        #020617;
      background-size: 34px 34px, 34px 34px, auto, auto, auto, auto;
      color: var(--text);
    }

    .app-header {
      position: fixed;
      left: 0;
      right: 0;
      top: var(--vv-top);
      height: var(--header-height);
      padding: var(--top-safe) calc(10px + env(safe-area-inset-right, 0px)) 0 calc(10px + env(safe-area-inset-left, 0px));
      flex-shrink: 0;
      display: grid;
      grid-template-columns: minmax(92px, 1fr) auto minmax(92px, 1fr);
      align-items: center;
      gap: 6px;
      background: rgba(2, 6, 23, 0.72);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 10px 30px rgba(0,0,0,0.24);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      z-index: 20;
      overflow: hidden;
    }

    .header-left,
    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .header-left {
      overflow: hidden;
    }

    .header-right {
      justify-content: flex-end;
      flex-wrap: nowrap;
      overflow: visible;
    }

    .app-logo {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      object-fit: cover;
      display: block;
      box-shadow: 0 0 18px rgba(56,189,248,0.26);
    }

    .logo-wrap {
      position: relative;
      width: 32px;
      height: 32px;
      flex: 0 0 auto;
      display: block;
    }

    .logo-unread-badge {
      display: none;
      position: absolute;
      top: -7px;
      right: -9px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: #ef4444;
      color: #fff;
      font-size: 11px;
      line-height: 18px;
      text-align: center;
      font-weight: 950;
      box-shadow: 0 0 14px rgba(239,68,68,0.75);
      border: 1px solid rgba(255,255,255,0.55);
    }

    .room-back-btn {
      flex: 0 0 auto;
      border: 1px solid rgba(56,189,248,0.24);
      background: rgba(15,23,42,0.50);
      color: #dff7ff;
      border-radius: 999px;
      padding: 7px 9px;
      font-size: 12px;
      font-weight: 950;
      line-height: 1;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: inset 0 0 14px rgba(56,189,248,0.06);
    }

    .room-back-btn:active {
      transform: scale(0.97);
      opacity: 0.86;
    }

    .room-title-btn {
      max-width: 100%;
      min-width: 0;
      border: 1px solid rgba(56,189,248,0.22);
      background: rgba(15,23,42,0.45);
      color: #e0f7ff;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 950;
      letter-spacing: 0.03em;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      box-shadow: inset 0 0 14px rgba(56,189,248,0.06);
    }

    .room-title-btn:active {
      transform: scale(0.97);
      opacity: 0.86;
    }

    .header-btn {
      border: 1px solid rgba(56,189,248,0.28);
      background: rgba(15, 23, 42, 0.66);
      color: #dff7ff;
      border-radius: 999px;
      padding: 7px 10px;
      min-width: 48px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: inset 0 0 18px rgba(56,189,248,0.06);
    }

    .header-btn:active {
      transform: scale(0.97);
      opacity: 0.86;
    }

    .data-status {
      justify-self: center;
      width: min(198px, 46vw);
      max-width: 100%;
      height: 30px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 10px;
      border: 1px solid rgba(148,163,184,0.18);
      background: rgba(15,23,42,0.72);
      box-shadow: inset 0 0 18px rgba(56,189,248,0.07);
      color: rgba(226, 232, 240, 0.92);
      font-size: 11.5px;
      font-weight: 900;
      overflow: hidden;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--red);
      box-shadow: 0 0 10px rgba(239,68,68,0.9);
      flex-shrink: 0;
    }

    .data-status.connected .status-dot {
      background: var(--green);
      box-shadow: 0 0 12px rgba(34,197,94,0.95);
    }

    .data-status.connecting .status-dot {
      background: var(--yellow);
      box-shadow: 0 0 12px rgba(245,158,11,0.95);
    }

    .app-body {
      position: fixed;
      left: 0;
      right: 0;
      top: calc(var(--vv-top) + var(--header-height));
      height: calc(var(--visible-height) - var(--header-height));
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 8;
    }

    .screen {
      display: none;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding: 14px 14px calc(120px + var(--bottom-safe));
    }

    .nickname-line {
      display: none !important;
    }

    .room-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .room-row {
      border: 1px solid rgba(56, 189, 248, 0.18);
      background:
        radial-gradient(circle at 0% 0%, rgba(56,189,248,0.10), transparent 36%),
        linear-gradient(135deg, rgba(15,23,42,0.86), rgba(2,6,23,0.72));
      border-radius: 20px;
      padding: 15px;
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow:
        0 14px 30px rgba(0,0,0,0.20),
        inset 0 0 22px rgba(56,189,248,0.035);
      cursor: pointer;
    }

    .room-main {
      min-width: 0;
    }

    .room-name {
      font-size: 17px;
      font-weight: 950;
      color: #effbff;
      letter-spacing: 0.03em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .room-meta {
      display: none !important;
    }

    .room-side {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 7px;
      min-width: 54px;
    }

    .room-badge {
      flex-shrink: 0;
      border: 1px solid rgba(56,189,248,0.26);
      color: #93e8ff;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      background: rgba(56,189,248,0.08);
    }

    .room-unread {
      min-width: 24px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(239, 68, 68, 0.92);
      color: #fff;
      font-size: 12px;
      font-weight: 950;
      box-shadow: 0 0 18px rgba(239,68,68,0.45);
      border: 1px solid rgba(255,255,255,0.22);
    }

    .chat-shell {
      display: none;
      flex: 1;
      min-height: 0;
      flex-direction: column;
      overflow: hidden;
    }

    .room-subbar {
      flex-shrink: 0;
      min-height: 0;
      height: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      background: transparent;
      border-bottom: 0;
      color: rgba(226,232,240,0.62);
      font-size: 12px;
      overflow: hidden;
      white-space: nowrap;
    }

    .history-tip {
      display: none;
      margin-left: auto;
      color: rgba(147, 232, 255, 0.9);
      font-weight: 800;
    }

    .chat-box {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding: 14px 12px 110px;
    }

    .msg-wrap {
      display: flex;
      flex-direction: column;
      margin-bottom: 12px;
      max-width: 100%;
    }

    .msg-wrap.me {
      align-items: flex-end;
    }

    .msg-wrap.other {
      align-items: flex-start;
    }

    .meta {
      font-size: 11px;
      color: rgba(226,232,240,0.48);
      margin-bottom: 5px;
      padding: 0 6px;
      max-width: 80%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bubble {
      max-width: 78%;
      padding: 11px 13px;
      border-radius: 17px;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
      border: 1px solid rgba(148,163,184,0.14);
      box-shadow: 0 10px 20px rgba(0,0,0,0.16);
    }

    .me .bubble {
      background: linear-gradient(135deg, rgba(37,99,235,0.94), rgba(14,165,233,0.86));
      color: white;
      border-top-right-radius: 5px;
      box-shadow: 0 0 22px rgba(37,99,235,0.22);
    }

    .other .bubble {
      background: rgba(15, 23, 42, 0.82);
      color: #e5f4ff;
      border-top-left-radius: 5px;
    }

    .send-area {
      position: fixed;
      left: 0;
      right: 0;
      top: calc(var(--vv-top) + var(--visible-height) - var(--send-height));
      bottom: auto;
      height: var(--send-height);
      min-height: var(--send-height);
      padding: 9px 10px calc(9px + var(--bottom-safe));
      display: none;
      gap: 8px;
      background: rgba(2, 6, 23, 0.82);
      border-top: 1px solid rgba(56,189,248,0.16);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      z-index: 18;
    }

    .send-area input {
      flex: 1;
      min-width: 0;
      border: 1px solid rgba(56,189,248,0.18);
      background: rgba(15,23,42,0.86);
      color: var(--text);
      border-radius: 999px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }

    .send-area input::placeholder {
      color: rgba(226,232,240,0.42);
    }

    .send-area button {
      border: none;
      border-radius: 999px;
      padding: 0 18px;
      color: white;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(14,165,233,0.28);
    }

    .modal-mask {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 80;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,0.42);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .modal {
      width: min(90vw, 330px);
      border: 1px solid rgba(56,189,248,0.22);
      border-radius: 24px;
      background: rgba(2, 6, 23, 0.92);
      box-shadow: 0 26px 72px rgba(0,0,0,0.44), inset 0 0 22px rgba(56,189,248,0.045);
      padding: 18px;
      color: var(--text);
    }

    .modal h3 {
      margin: 0 0 14px;
      font-size: 18px;
      letter-spacing: 0.04em;
    }

    .input {
      width: 100%;
      border: 1px solid rgba(56,189,248,0.20);
      background: rgba(15,23,42,0.85);
      color: var(--text);
      border-radius: 15px;
      padding: 13px 14px;
      outline: none;
      font-size: 15px;
      margin-bottom: 10px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .modal-actions.vertical {
      flex-direction: column;
    }

    .modal-actions button {
      flex: 1;
      border: none;
      border-radius: 15px;
      padding: 12px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .cancel-btn {
      background: rgba(148,163,184,0.14);
      color: var(--text);
    }

    .confirm-btn {
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      color: white;
    }

    .danger-btn {
      background: rgba(220,38,38,0.82);
      color: white;
    }

    .toast {
      position: fixed;
      top: calc(70px + var(--top-safe));
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      z-index: 110;
      display: none;
      padding: 9px 14px;
      border-radius: 999px;
      color: white;
      background: rgba(15,23,42,0.82);
      border: 1px solid rgba(56,189,248,0.22);
      box-shadow: 0 10px 28px rgba(0,0,0,0.32);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 13px;
      font-weight: 900;
    }

    .emergency-bar {
      display: none;
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 60;
      pointer-events: none;
    }

    .emergency-close-btn {
      width: 116px;
      height: 116px;
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 25%, rgba(255,255,255,0.18), transparent 30%),
        rgba(220, 38, 38, 0.10);
      color: #fff;
      cursor: pointer;
      box-shadow:
        0 0 28px rgba(239,68,68,0.24),
        0 12px 34px rgba(0,0,0,0.26),
        inset 0 0 18px rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0;
      gap: 6px;
    }

    .emergency-main,
    .emergency-sub {
      display: block;
      width: 100%;
      text-align: center;
      white-space: nowrap;
      text-shadow: 0 1px 8px rgba(0,0,0,0.42);
    }

    .emergency-main {
      font-size: 18px;
      font-weight: 950;
      letter-spacing: 0.08em;
      line-height: 1;
    }

    .emergency-sub {
      font-size: 13px;
      font-weight: 850;
      letter-spacing: 0.12em;
      line-height: 1;
      opacity: 0.94;
    }

    .emergency-close-btn:active {
      transform: scale(0.96);
      opacity: 0.84;
    }

    @media (max-width: 420px) {
      .app-header {
        grid-template-columns: minmax(82px, 1fr) auto minmax(82px, 1fr);
        gap: 5px;
        padding-left: calc(8px + env(safe-area-inset-left, 0px));
        padding-right: calc(8px + env(safe-area-inset-right, 0px));
      }
      .app-logo {
        width: 34px;
        height: 34px;
      }
      .room-back-btn {
        padding: 7px 8px;
        font-size: 11.2px;
      }
      .room-title-btn {
        max-width: 88px;
        padding: 7px 8px;
        font-size: 11.2px;
      }
      .data-status {
        width: min(176px, 45vw);
        font-size: 10.8px;
        padding: 0 7px;
      }
      .header-btn {
        min-width: 46px;
        padding: 7px 9px;
        font-size: 12px;
      }
      .header-right {
        gap: 5px;
      }
    }

  </style>
  <!-- tech-style-restored + keypad-config-fixed: 20260510 -->
</head>

<body>

<div class="calculator" id="calculator">
  <div class="display" id="display">0</div>

  <div class="grid">
    <button class="btn function" onclick="clearCalc()">C</button>
    <button class="btn function" onclick="backspaceCalc()">⌫</button>
    <button class="btn function" onclick="appendOperator('%')">%</button>
    <button class="btn operator" onclick="appendOperator('/')">÷</button>

    <button class="btn" onclick="appendNumber('1')">1</button>
    <button class="btn" onclick="appendNumber('2')">2</button>
    <button class="btn" onclick="appendNumber('3')">3</button>
    <button class="btn operator" onclick="appendOperator('*')">×</button>

    <button class="btn" onclick="appendNumber('4')">4</button>
    <button class="btn" onclick="appendNumber('5')">5</button>
    <button class="btn" onclick="appendNumber('6')">6</button>
    <button class="btn operator" onclick="appendOperator('-')">−</button>

    <button class="btn" onclick="appendNumber('7')">7</button>
    <button class="btn" onclick="appendNumber('8')">8</button>
    <button class="btn" onclick="appendNumber('9')">9</button>
    <button class="btn operator" onclick="appendOperator('+')">+</button>

    <button class="btn zero" onclick="appendNumber('0')">0</button>
    <button class="btn" onclick="appendDot()">.</button>
    <button class="btn operator" onclick="calculateResult()">=</button>
