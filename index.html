const CFG_URL="vx-config.json",VER="2026.05.15-local-mqtt-gist-v1",GH="https://api.github.com",RP="VX_ROOM_V1:",MP="VX_MSG_V1:",BP="VX_MSG_BATCH_V1:",AP="VX_ANN_V1:";

function b64(b){let x=atob(b),a=new Uint8Array(x.length);for(let i=0;i<x.length;i++)a[i]=x.charCodeAt(i);return a}async function key(p,s){let base=await crypto.subtle.importKey("raw",new TextEncoder().encode(p),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt:s,iterations:180000,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"])}async function dec(c,b){let e=b.encryptedConfig||b,k=await key(c,b64(e.salt)),d=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(e.iv)},k,b64(e.data));return JSON.parse(new TextDecoder().decode(d))}async function unlock(){let a=tails(ce);if(!a.length)return;try{let r=await fetch(CFG_URL+"?t="+N(),{cache:"no-store"}),b=await r.json();for(let c of a){try{let x=await dec(c,b);if(x.token&&x.gistId){cfg={token:x.token,gistId:x.gistId,adminPassword:x.adminPassword||"",roomChars:x.roomChars||"ABCDEFGHJKLMNPQRSTUVWXYZ23456789",mqttUrl:x.mqttUrl||"",mqttUser:x.mqttUser||"",mqttPass:x.mqttPass||"",mqttPrefix:(x.mqttPrefix||"vx/app/calcchat/v1").replace(/\/+$/,"")};return openApp()}}catch(e){}}}catch(e){}}

function hdr(o={}){return{"Accept":"application/vnd.github+json","Authorization":"Bearer "+cfg.token,"X-GitHub-Api-Version":"2022-11-28",...o}}async function api(p,o={}){let r=await fetch(GH+p,{...o,headers:hdr(o.headers||{})});if(!r.ok)throw Error(r.status);return r.status==204?null:r.json()}async function load(){comments=[];let p=1;while(1){let a=await api(`/gists/${encodeURIComponent(cfg.gistId)}/comments?per_page=100&page=${p++}&t=${N()}`,{cache:"no-store"});comments.push(...a);if(a.length<100)break}}async function post(b){return api(`/gists/${encodeURIComponent(cfg.gistId)}/comments`,{method:"POST",headers:{"Content-Type":"application/json"},body:J({body:b})})}async function del(id){return api(`/gists/${encodeURIComponent(cfg.gistId)}/comments/${id}`,{method:"DELETE"})}
function parse(){let map={};ann=null;for(let c of comments){let b=c.body||"";try{if(b.startsWith(RP)){let r=JSON.parse(b.slice(RP.length));r.cid=c.id;let o=map[r.no];if(!o||+(r.updatedAt||r.createdAt||0)>+(o.updatedAt||o.createdAt||0))map[r.no]=r}else if(b.startsWith(AP)){let a=JSON.parse(b.slice(AP.length));a.cid=c.id;if(!ann||+a.time>+ann.time)ann=a}}catch(e){}}rooms=Object.values(map).sort((a,b)=>(+(b.updatedAt||b.createdAt||0))-(+(a.updatedAt||a.createdAt||0)))}async function refresh(){try{await load();parse();gistOk=true;if(!cur){if(tabName=="hall")hall();else if(tabName=="ann")announcement();else me()}}catch(e){gistOk=false}state()}
function boot(){tick();setInterval(tick,1000);refresh();loadMqtt();setInterval(()=>ok&&refresh(),60000);tab("hall");addEventListener("focusin",fixVV);addEventListener("focusout",()=>setTimeout(fixVV,120));if(visualViewport){visualViewport.addEventListener("resize",fixVV);visualViewport.addEventListener("scroll",fixVV)}document.addEventListener("visibilitychange",()=>{if(document.hidden)uploadPending()});addEventListener("pagehide",()=>uploadPending());["nHall","nAnn","nMe"].forEach((id,i)=>$(id).addEventListener("touchend",e=>{e.preventDefault();tab(["hall","ann","me"][i])},{passive:false}))}function fixVV(){let kb=0,top=0;if(document.body.classList.contains("room")&&window.visualViewport){let v=visualViewport;kb=Math.max(0,innerHeight-v.height-v.offsetTop);top=Math.max(0,v.offsetTop)}document.documentElement.style.setProperty("--kb",kb+"px");document.documentElement.style.setProperty("--vtop",top+"px")}
function tick(){let t=new Date().toTimeString().slice(0,8),n=cur?roomCount():allCount();$("dataBtn").innerHTML=`<span class="dot"></span>数据 ${t} 在线${n}`;state(false)}function state(){let good=gistOk&&mqttOk;$("dataBtn").classList.toggle("bad",!good)}function T(s){return cfg.mqttPrefix+"/"+s}function pub(t,p){try{if(mq&&mqttOk)mq.publish(t,J(p),{qos:0,retain:false})}catch(e){}}
function loadMqtt(){if(window.mqtt)return conn();let s=document.createElement("script");s.src="https://unpkg.com/mqtt/dist/mqtt.min.js";s.onload=conn;s.onerror=()=>{mqttOk=false;state()};document.head.appendChild(s)}function conn(){if(!window.mqtt||!cfg.mqttUrl)return;mq=mqtt.connect(cfg.mqttUrl,{username:cfg.mqttUser,password:cfg.mqttPass,clientId:"vx_"+dt+"_"+N(),clean:true,keepalive:30,reconnectPeriod:3000,connectTimeout:8000});mq.on("connect",()=>{mqttOk=true;state();mq.subscribe(T("all"));mq.subscribe(T("presence/all"));if(cur)subRoom(cur.no);setInterval(globalBeat,8000);globalBeat()});mq.on("close",()=>{mqttOk=false;state()});mq.on("error",()=>{mqttOk=false;state()});mq.on("message",(t,m)=>onMqtt(t,m.toString()))}function onMqtt(t,s){let p={};try{p=JSON.parse(s)}catch(e){}if(t==T("all")){if(["rooms","announcement","clear","delete"].includes(p.type))refresh();return}if(t==T("presence/all")){gOnline[p.id]=N();tick();return}if(cur&&t==T("room/"+cur.no)){if(p.type=="message"&&p.message){addLocal(p.roomNo,p.message,false);if(p.roomNo==cur.no)renderChat()}else if(p.type=="roomUpdate")renderChat();return}if(cur&&t==T("presence/"+cur.no)){if(!p.admin)rOnline[p.id]=N();tick()}}
function globalBeat(){pub(T("presence/all"),{id:dt,time:N(),admin})}function subRoom(no){if(mq&&mqttOk){mq.subscribe(T("room/"+no));mq.subscribe(T("presence/"+no))}clearInterval(pt);rOnline={};roomBeat();pt=setInterval(roomBeat,8000)}function roomBeat(){if(!cur)return;pub(T("presence/"+cur.no),{id:dt,time:N(),admin});if(!admin)rOnline[dt]=N();tick()}function clean(m){let c=N()-24000,n=0;for(let k in m){if(m[k]>c)n++;else delete m[k]}return n}function allCount(){gOnline[dt]=N();return clean(gOnline)}function roomCount(){if(!admin)rOnline[dt]=N();return clean(rOnline)||(!admin?1:0)}
function L(k,d){try{return JSON.parse(localStorage.getItem(k)||J(d))}catch(e){return d}}function S(k,v){localStorage.setItem(k,J(v))}function mKey(no){return "vx_msgs_"+no}function pKey(){return "vx_pending_msgs"}function localMsgs(no){return L(mKey(no),[])}function saveMsgs(no,a){let m={};for(let x of a)m[x.id||legacyId(x)]=x;S(mKey(no),Object.values(m).sort((a,b)=>(+a.time)-(+b.time)))}function legacyId(m){return [m.sender,m.text,m.time].join("|")}function addLocal(no,m,pending){if(!m.id)m.id=legacyId(m);let a=localMsgs(no);if(!a.some(x=>(x.id||legacyId(x))==m.id)){a.push(m);saveMsgs(no,a)}if(pending){let p=L(pKey(),[]);if(!p.some(x=>x.id==m.id)){p.push({...m,roomNo:no});S(pKey(),p)}}}
async function uploadPending(roomNo){let all=L(pKey(),[]);if(!all.length)return;let groups={};for(let m of all){if(roomNo&&m.roomNo!=roomNo)continue;(groups[m.roomNo]||(groups[m.roomNo]=[])).push(m)}let done=new Set();for(let no in groups){let arr=groups[no];if(!arr.length)continue;try{await post(BP+no+":"+J({time:N(),messages:arr.map(({roomNo,...x})=>x)}));arr.forEach(m=>done.add(m.id))}catch(e){}}if(done.size)S(pKey(),all.filter(m=>!done.has(m.id)))}function mergeGistMessages(no){let a=localMsgs(no),add=[];for(let c of comments){let b=c.body||"";try{if(b.startsWith(MP+no+":")){let m=JSON.parse(b.slice((MP+no+":").length));if(!m.id)m.id=legacyId(m);add.push(m)}else if(b.startsWith(BP+no+":")){let pack=JSON.parse(b.slice((BP+no+":").length));(pack.messages||[]).forEach(m=>{if(!m.id)m.id=legacyId(m);add.push(m)})}}catch(e){}}saveMsgs(no,a.concat(add))}

function hall(){let v=new Set(vis()),list=rooms.filter(r=>v.has(r.no));main(`<div class="search"><input id="searchInput" placeholder="请输入房间号" autocomplete="off"><button class="btn primary" onclick="searchRoom()">搜索</button></div>${list.length?list.map(r=>card(r,false)).join(""):`<div class="empty">暂无房间</div>`}`)}function card(r,a){return `<div class="card click" onclick="requestEnter('${E(r.no)}',${a})"><div class="row"><div><div class="title">${E(r.no)}</div><div class="muted">${E(rname(r))} · ${F(r.createdAt)}</div></div></div>${a?`<div class="actions" onclick="event.stopPropagation()"><button class="btn danger" onclick="clearRoom('${E(r.no)}')">清空聊天记录</button><button class="btn danger" onclick="deleteRoom('${E(r.no)}')">删除房间</button></div>`:""}</div>`}
async function requestEnter(no,isAdmin){let r=rooms.find(x=>x.no==no);if(!r)return toast("未找到房间");if(!isAdmin&&!admin&&!verified(no)){let p=prompt("请输入房间密码");if(p!==r.password)return toast("密码错误");setVerified(no)}await uploadPending();enterRoom(no)}async function searchRoom(){let q=($("searchInput").value||"").trim();if(!q)return;if(q==cfg.adminPassword){admin=true;toast("管理员模式已开启");tab("me");return}let r=rooms.find(x=>String(x.no).toUpperCase()==q.toUpperCase());if(!r)return toast("未找到房间");addVis(r.no);requestEnter(r.no,false)}function genNo(){let used=new Set(rooms.map(r=>r.no));for(let i=0;i<1000000;i++){let s=String(i).padStart(6,"0");if(!used.has(s))return s}let Ls="ABCDEFGHJKLMNPQRSTUVWXYZ";for(let ch of Ls)for(let i=0;i<100000;i++){let s=ch+String(i).padStart(5,"0");if(!used.has(s))return s}return String(N()).slice(-6)}async function newRoom(){let password=prompt("请设置房间密码");if(!password)return;let no=genNo(),r={no,password,name:no,createdAt:N(),updatedAt:N(),owner:dt};await post(RP+J(r));addVis(no);pub(T("all"),{type:"rooms",no,time:N()});await refresh();toast("房间已创建")}
function announcement(){if(admin)main(`<div class="card"><div class="title">公告管理</div><div class="muted">发布后通过 MQTT 通知在线用户刷新。</div><input class="inp" id="annTitle" placeholder="公告标题" value="${E(ann?.title||"系统公告")}" style="margin-top:12px"><textarea id="annContent" placeholder="公告内容">${E(ann?.content||"")}</textarea><div class="actions"><button class="btn primary" onclick="saveAnn()">发布公告</button><button class="btn danger" onclick="clearAnn()">清空公告</button></div></div>`);else main(`<div class="card"><div class="title">${E(ann?.title||"公告")}</div><div style="line-height:1.7;margin-top:12px">${ann?.content?E(ann.content).replace(/\n/g,"<br>"):"暂无公告，谢谢使用。"}</div><div class="muted">${ann?.time?F(ann.time):""}</div></div>`)}async function saveAnn(){for(let c of comments)if((c.body||"").startsWith(AP))await del(c.id);await post(AP+J({title:($("annTitle").value||"系统公告").trim(),content:($("annContent").value||"").trim(),time:N()}));pub(T("all"),{type:"announcement",time:N()});await refresh();toast("公告已发布")}async function clearAnn(){if(!confirm("确认清空公告？"))return;for(let c of comments)if((c.body||"").startsWith(AP))await del(c.id);pub(T("all"),{type:"announcement",time:N()});await refresh()}
function me(){if(!admin)return main(`<div class="empty">谢谢使用！</div>`);main(`<div class="card"><div class="title">管理后台</div><div class="muted">当前版本：${VER}</div><div class="muted">所有房间：${rooms.length}</div><div class="actions"><button class="btn danger" onclick="exitAdmin()">退出管理</button></div></div>${rooms.length?rooms.map(r=>card(r,true)).join(""):`<div class="empty">暂无房间</div>`}`)}function exitAdmin(){admin=false;toast("已退出管理");tab("me")}
function enterRoom(no){let r=rooms.find(x=>x.no==no);if(!r)return;cur=r;tabName="room";document.body.classList.add("room");fixVV();$("backBtn").classList.remove("hide");$("roomTag").classList.remove("hide");$("roomTag").textContent=r.no;$("newBtn").classList.add("hide");$("send").style.display="flex";subRoom(no);mergeGistMessages(no);renderChat();clearInterval(upTimer);setTimeout(()=>{upTimer=setInterval(()=>uploadPending(no),60000)},60000);setTimeout(()=>$("main").scrollTop=$("main").scrollHeight,80)}function renderChat(){if(!cur)return;let list=localMsgs(cur.no);main(`<div id="chat">${list.map(m=>`<div class="msg ${m.sender==dt?"me":"other"}"><div class="meta">${m.sender==dt?"我":"用户"}</div><div class="bubble">${E(m.text)}</div></div>`).join("")}</div>`);tick()}function back(){if(cur)uploadPending(cur.no);cur=null;clearInterval(pt);clearInterval(upTimer);$("send").style.display="none";$("backBtn").classList.add("hide");$("roomTag").classList.add("hide");tab("hall")}async function sendMsg(){if(sending)return;let text=($("msg").value||"").trim();if(!text||!cur)return;sending=true;$("msg").value="";let m={id:dt+"_"+N()+"_"+Math.random().toString(36).slice(2,6),sender:dt,text,time:N()};addLocal(cur.no,m,true);renderChat();pub(T("room/"+cur.no),{type:"message",roomNo:cur.no,message:m,time:N()});setTimeout(()=>$("main").scrollTop=$("main").scrollHeight,60);sending=false}
async function clearRoom(no){if(!confirm("确认清空该房间聊天记录？"))return;let ps=[MP+no+":",BP+no+":"];for(let c of comments){let b=c.body||"";if(ps.some(p=>b.startsWith(p)))await del(c.id)}localStorage.removeItem(mKey(no));let p=L(pKey(),[]).filter(m=>m.roomNo!=no);S(pKey(),p);pub(T("room/"+no),{type:"roomUpdate",action:"clear",time:N()});await refresh();toast("已清空")}async function deleteRoom(no){if(!confirm("确认删除该房间？"))return;let ps=[MP+no+":",BP+no+":"];for(let c of comments){let b=c.body||"";if(ps.some(p=>b.startsWith(p)))await del(c.id);if(b.startsWith(RP)){try{if(JSON.parse(b.slice(RP.length)).no==no)await del(c.id)}catch(e){}}}localStorage.removeItem(mKey(no));saveVis(vis().filter(x=>x!==no));pub(T("all"),{type:"delete",no,time:N()});cur=null;await refresh();tab("me")}function toast(t){$("mbox").innerHTML=`<h3>${E(t)}</h3><div class="actions"><button class="btn primary" onclick="$('modal').style.display='none'">确定</button></div>`;$("modal").style.display="flex"}$("modal").onclick=e=>{if(e.target.id=="modal")e.target.style.display="none"}
</script></body></html>
