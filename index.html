<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Calculator</title>

  <link rel="apple-touch-icon" href="https://china-xxoo.github.io/vx/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="https://china-xxoo.github.io/vx/apple-touch-icon.png" />

  <meta name="theme-color" content="#111827" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Calculator" />

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111827;
      color: #fff;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .app {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background:
        radial-gradient(circle at top, rgba(55,65,81,0.92), transparent 34%),
        radial-gradient(circle at bottom, rgba(15,23,42,1), #020617 72%);
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      object-fit: cover;
      margin-bottom: 22px;
      background: #111827;
      box-shadow: 0 18px 44px rgba(0,0,0,0.35);
    }

    .title {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .sub-title {
      font-size: 13px;
      color: rgba(255,255,255,0.62);
      margin-bottom: 28px;
      text-align: center;
      line-height: 1.5;
    }

    .status-card {
      width: min(92vw, 390px);
      border-radius: 28px;
      padding: 24px 20px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 24px 80px rgba(0,0,0,0.28);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-align: center;
    }

    .big-dot {
      width: 78px;
      height: 78px;
      border-radius: 999px;
      margin: 4px auto 18px;
      background: #ef4444;
      box-shadow: 0 0 34px rgba(239,68,68,0.75);
      transition: 0.25s ease;
    }

    .big-dot.green {
      background: #22c55e;
      box-shadow: 0 0 38px rgba(34,197,94,0.82);
    }

    .big-dot.yellow {
      background: #f59e0b;
      box-shadow: 0 0 38px rgba(245,158,11,0.82);
    }

    .status-text {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .status-desc {
      min-height: 44px;
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.68);
      word-break: break-all;
    }

    .mini-row {
      margin-top: 18px;
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 999px;
      padding: 12px 14px;
      color: #111827;
      background: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .log {
      width: min(92vw, 390px);
      height: 132px;
      margin-top: 14px;
      padding: 12px;
      overflow-y: auto;
      border-radius: 18px;
      background: rgba(0,0,0,0.24);
      color: rgba(255,255,255,0.72);
      font-size: 12px;
      line-height: 1.45;
      text-align: left;
      overscroll-behavior: contain;
    }
  </style>
</head>

<body>
  <div class="app">
    <img class="logo" src="https://china-xxoo.github.io/vx/apple-touch-icon.png" alt="logo" />

    <div class="title">私有 EMQX 后台检测</div>
    <div class="sub-title">GitHub Pages 打开页面，检测手机能不能连接你的私有 MQTT 实时后台。</div>

    <div class="status-card">
      <div class="big-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">后台未连接</div>
      <div class="status-desc" id="statusDesc">等待连接...</div>

      <div class="mini-row">
        <button class="btn" onclick="reconnectNow()">重新连接</button>
      </div>
    </div>

    <div class="log" id="logBox"></div>
  </div>

  <script>
    const MQTT_WS_URL = "wss://afa67eee.ala.cn-hangzhou.emqxsl.cn:8084/mqtt";
    const MQTT_USERNAME = "vx_user";
    const MQTT_PASSWORD = "vx_2026_chat_private_520_xx";

    const CLIENT_ID = "vx_web_" + Math.random().toString(16).slice(2) + "_" + Date.now();
    const TEST_TOPIC = "vx/private/test/" + CLIENT_ID;

    let ws = null;
    let reconnectTimer = null;
    let pingTimer = null;
    let packetId = 1;
    let connected = false;
    let receivedSelfTest = false;

    function log(text) {
      const box = document.getElementById("logBox");
      const time = new Date().toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
      box.innerHTML = "[" + time + "] " + text + "<br>" + box.innerHTML;
    }

    function setStatus(type, desc) {
      const dot = document.getElementById("statusDot");
      const text = document.getElementById("statusText");
      const descEl = document.getElementById("statusDesc");

      dot.className = "big-dot";

      if (type === "connected") {
        dot.classList.add("green");
        text.textContent = "后台已连接";
        descEl.textContent = desc || "私有 EMQX MQTT WebSocket 已连接。";
        return;
      }

      if (type === "connecting") {
        dot.classList.add("yellow");
        text.textContent = "后台连接中";
        descEl.textContent = desc || "正在连接私有 EMQX MQTT 后台...";
        return;
      }

      text.textContent = "后台未连接";
      descEl.textContent = desc || "当前设备无法连接私有 EMQX MQTT 后台。";
    }

    function encodeString(str) {
      const encoder = new TextEncoder();
      const bytes = encoder.encode(str);
      return [bytes.length >> 8, bytes.length & 255, ...bytes];
    }

    function encodeLength(length) {
      const encoded = [];
      do {
        let digit = length % 128;
        length = Math.floor(length / 128);
        if (length > 0) digit = digit | 128;
        encoded.push(digit);
      } while (length > 0);
      return encoded;
    }

    function makePacket(type, body) {
      return new Uint8Array([type, ...encodeLength(body.length), ...body]);
    }

    function sendPacket(type, body) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(makePacket(type, body));
    }

    function sendConnect() {
      const variableHeader = [
        ...encodeString("MQTT"),
        4,
        0xC2,
        0,
        30
      ];

      const payload = [
        ...encodeString(CLIENT_ID),
        ...encodeString(MQTT_USERNAME),
        ...encodeString(MQTT_PASSWORD)
      ];

      sendPacket(0x10, [...variableHeader, ...payload]);
      log("发送 CONNECT：用户名密码认证");
    }

    function sendSubscribe(topic) {
      const id = packetId++;
      const variableHeader = [id >> 8, id & 255];
      const payload = [...encodeString(topic), 0];
      sendPacket(0x82, [...variableHeader, ...payload]);
      log("订阅：" + topic);
    }

    function sendPublish(topic, message) {
      const encoder = new TextEncoder();
      const payload = [
        ...encodeString(topic),
        ...encoder.encode(message)
      ];
      sendPacket(0x30, payload);
      log("发布测试消息");
    }

    function sendPing() {
      sendPacket(0xC0, []);
      log("PING");
    }

    function parseRemainingLength(bytes, index) {
      let multiplier = 1;
      let value = 0;
      let encodedByte;
      let pos = index;

      do {
        encodedByte = bytes[pos++];
        value += (encodedByte & 127) * multiplier;
        multiplier *= 128;
      } while ((encodedByte & 128) !== 0);

      return {
        value,
        nextIndex: pos
      };
    }

    function decodeString(bytes, index) {
      const len = (bytes[index] << 8) + bytes[index + 1];
      const start = index + 2;
      const end = start + len;
      const decoder = new TextDecoder();
      return {
        value: decoder.decode(bytes.slice(start, end)),
        nextIndex: end
      };
    }

    function handlePacket(arrayBuffer) {
      const bytes = new Uint8Array(arrayBuffer);
      const type = bytes[0] >> 4;
      const rem = parseRemainingLength(bytes, 1);
      let index = rem.nextIndex;

      if (type === 2) {
        const returnCode = bytes[index + 1];

        if (returnCode !== 0) {
          setStatus("disconnected", "认证失败，CONNACK 返回码：" + returnCode);
          log("CONNACK 失败，返回码：" + returnCode);
          return;
        }

        connected = true;
        log("CONNACK，连接成功");

        sendSubscribe(TEST_TOPIC);

        setTimeout(function () {
          sendPublish(TEST_TOPIC, "hello-private-" + Date.now());
        }, 500);

        pingTimer = setInterval(sendPing, 15000);
        return;
      }

      if (type === 3) {
        const topicInfo = decodeString(bytes, index);
        const topic = topicInfo.value;
        index = topicInfo.nextIndex;

        const decoder = new TextDecoder();
        const message = decoder.decode(bytes.slice(index));

        log("收到消息：" + topic + " / " + message);

        if (topic === TEST_TOPIC) {
          receivedSelfTest = true;
          setStatus("connected", "连接成功，并且已收到自己发布的测试消息。");
        }

        return;
      }

      if (type === 9) {
        log("SUBACK");
        return;
      }

      if (type === 13) {
        log("PONG");
        if (connected) setStatus("connected", "MQTT 心跳正常。");
        return;
      }

      log("收到 MQTT 包类型：" + type);
    }

    function clearTimers() {
      clearTimeout(reconnectTimer);
      clearInterval(pingTimer);
      reconnectTimer = null;
      pingTimer = null;
    }

    function connectMQTT() {
      clearTimers();
      connected = false;
      receivedSelfTest = false;
      setStatus("connecting");
      log("开始连接：" + MQTT_WS_URL);

      try {
        ws = new WebSocket(MQTT_WS_URL, "mqtt");
        ws.binaryType = "arraybuffer";
      } catch (e) {
        setStatus("disconnected", "WebSocket 创建失败：" + e.message);
        log("创建失败：" + e.message);
        scheduleReconnect();
        return;
      }

      ws.onopen = function () {
        log("WebSocket 已打开");
        sendConnect();
      };

      ws.onmessage = function (event) {
        handlePacket(event.data);
      };

      ws.onerror = function () {
        setStatus("disconnected", "连接出错。当前网络可能无法访问私有 EMQX WSS。");
        log("WebSocket error");
      };

      ws.onclose = function () {
        clearTimers();
        setStatus("disconnected", "连接已断开，5 秒后自动重连。");
        log("WebSocket close");
        scheduleReconnect();
      };

      setTimeout(function () {
        if (!receivedSelfTest) {
          setStatus("disconnected", "未收到测试消息，可能认证失败或连接不可用。");
        }
      }, 8000);
    }

    function scheduleReconnect() {
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connectMQTT, 5000);
    }

    function reconnectNow() {
      clearTimers();
      if (ws) {
        try { ws.close(); } catch (e) {}
      }
      connectMQTT();
    }

    document.addEventListener("visibilitychange", function () {
      if (!document.hidden) reconnectNow();
    });

    window.addEventListener("online", reconnectNow);

    window.addEventListener("offline", function () {
      setStatus("disconnected", "设备已离线。");
      log("offline");
    });

    document.addEventListener("touchmove", function (e) {
      e.preventDefault();
    }, { passive: false });

    connectMQTT();
  </script>
</body>
</html>
