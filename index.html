<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#ededed">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Calculator">
  <link rel="manifest" href="manifest.webmanifest?v=20260520-unreadcalc1">
  <link rel="icon" type="image/png" sizes="512x512" href="vx-logo-512.png?v=20260520-unreadcalc1">
  <link rel="apple-touch-icon" href="vx-logo-180.png?v=20260520-unreadcalc1">
  <style>
    :root{--app-height:100vh;--bg:#020617;--text:#eaf7ff}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100%;height:var(--app-height);min-height:100dvh;margin:0;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
    body{position:fixed;inset:0;min-height:var(--app-height)}
    button,input,textarea{font:inherit}
    button{border:0;cursor:pointer}
    #calc,#app{position:fixed;top:0;right:0;bottom:auto;left:0;height:var(--app-height);min-height:100dvh}
    .calc{display:flex;flex-direction:column;justify-content:flex-end;padding:calc(18px + env(safe-area-inset-top)) 18px calc(16px + env(safe-area-inset-bottom));background:linear-gradient(rgba(56,189,248,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.035) 1px,transparent 1px),linear-gradient(180deg,#061224 0%,#020617 72%);background-size:34px 34px,34px 34px,auto}
    #disp{flex:1;display:flex;align-items:flex-end;justify-content:flex-end;padding:20px 8px 28px;color:#fff;font-size:58px;font-weight:300;text-align:right;text-shadow:0 2px 18px rgba(56,189,248,.22);word-break:break-all}
    .keys{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .k{min-height:72px;border-radius:22px;background:linear-gradient(180deg,rgba(55,65,81,.94),rgba(15,23,42,.96));color:#fff;font-size:28px;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 10px 24px rgba(0,0,0,.26);touch-action:manipulation}
    .k:active{transform:scale(.97);opacity:.86}
    .fn{background:linear-gradient(180deg,#cbd5e1,#94a3b8);color:#111827}
    .op{background:linear-gradient(180deg,#f59e0b,#ea580c)}
    .zero{grid-column:span 2}
    #app,.modal{display:none}
    @media (max-width:380px){#disp{font-size:48px}.k{min-height:64px;border-radius:18px}}
  </style>
  <title>Calculator</title>
</head>
<body>
  <div id="calc" class="calc" aria-label="Calculator">
    <div id="disp">0</div>
    <div class="keys" aria-label="Calculator keys">
      <button class="k fn" type="button" data-calc="clear">C</button>
      <button class="k fn" type="button" data-calc="backspace">⌫</button>
      <button class="k fn" type="button" data-calc="unlock">%</button>
      <button class="k op" type="button" data-calc="operator" data-value="/">÷</button>
      <button class="k" type="button" data-calc="number" data-value="1">1</button>
      <button class="k" type="button" data-calc="number" data-value="2">2</button>
      <button class="k" type="button" data-calc="number" data-value="3">3</button>
      <button class="k op" type="button" data-calc="operator" data-value="*">×</button>
      <button class="k" type="button" data-calc="number" data-value="4">4</button>
      <button class="k" type="button" data-calc="number" data-value="5">5</button>
      <button class="k" type="button" data-calc="number" data-value="6">6</button>
      <button class="k op" type="button" data-calc="operator" data-value="-">−</button>
      <button class="k" type="button" data-calc="number" data-value="7">7</button>
      <button class="k" type="button" data-calc="number" data-value="8">8</button>
      <button class="k" type="button" data-calc="number" data-value="9">9</button>
      <button class="k op" type="button" data-calc="operator" data-value="+">+</button>
      <button class="k zero" type="button" data-calc="number" data-value="0">0</button>
      <button class="k" type="button" data-calc="dot">.</button>
      <button class="k op" type="button" data-calc="equals">=</button>
    </div>
  </div>
  <script>
    (function(){
      var expr="";
      var calc=document.getElementById("calc");
      var disp=document.getElementById("disp");
      if(!calc||!disp)return;
      var hint="",hintCount=0;
      function unreadTotal(){try{var data=JSON.parse(localStorage.getItem("vx_unread_rooms_v1")||"{}");var total=0;Object.keys(data).forEach(function(key){total+=Math.max(0,+data[key]||0)});return Math.min(999,total)}catch(error){return 0}}
      function unreadHint(total){if(!total)return"0";if(total!==hintCount||!hint){var left=total>1?Math.floor(Math.random()*total):0;var right=total-left;if(total>1&&left===0){left=1;right=total-1}hintCount=total;hint=left+"+"+right+"="+total}return hint}
      function show(){disp.textContent=(expr?expr:unreadHint(unreadTotal())).replaceAll("*","×").replaceAll("/","÷").slice(-18)}
      function number(value){if(expr==="0"||expr==="Error")expr="";expr+=value;show()}
      function operator(value){if(expr==="Error")expr="";if(!expr&&value!=="-")return;if("+-*/%".includes(expr.slice(-1)))expr=expr.slice(0,-1);expr+=value;show()}
      function dot(){var part=expr.split(/[+\-*/%]/).pop();if(!part.includes(".")){expr+=part?".":"0.";show()}}
      function equals(){try{if(!expr)return show();if(!/^[0-9+\-*/%. ]+$/.test(expr)||"+-*/%.".includes(expr.slice(-1)))throw new Error("bad expression");var result=Function("\"use strict\";return("+expr+")")();expr=Number.isFinite(result)?String(+result.toFixed(8)):"Error"}catch(error){expr="Error"}show()}
      function onClick(event){var button=event.target.closest("button[data-calc]");if(!button)return;var action=button.dataset.calc;var value=button.dataset.value;if(action==="number")number(value);else if(action==="operator")operator(value);else if(action==="dot")dot();else if(action==="clear"){expr="";show()}else if(action==="backspace"){expr=expr.slice(0,-1);show()}else if(action==="equals")equals();else if(action==="unlock"){window.__VX_PENDING_UNLOCK__=true;if(window.__VX_UNLOCK_NOW__)window.__VX_UNLOCK_NOW__()}}
      calc.addEventListener("click",onClick);
      window.__VX_CALC_BOOT__={getExpr:function(){return expr},stop:function(){calc.removeEventListener("click",onClick)}};
      show();
    })();
  </script>

  <div id="app" aria-hidden="true">
    <header class="top">
      <div class="left">
        <button id="backBtn" class="btn hide" type="button">返回</button>
        <button id="shareBtn" class="btn" type="button">分享</button>
        <button id="systemMsgBtn" class="btn hide" type="button">系统留言</button>
      </div>
      <button id="dataBtn" class="data" type="button"><span class="dot"></span>数据 00:00:00</button>
      <div class="right">
        <button id="newBtn" class="btn primary" type="button">新建房间</button>
        <span id="roomTag" class="btn hide"></span>
      </div>
    </header>
    <main id="main" class="main"></main>
    <nav id="nav" class="nav" aria-label="Main navigation">
      <button type="button" data-tab="hall" id="nHall" class="on">大厅</button>
      <button type="button" data-tab="ann" id="nAnn">公告</button>
      <button type="button" data-tab="me" id="nMe">我的</button>
    </nav>
    <form id="send" autocomplete="off">
      <input id="msg" autocomplete="off" placeholder="输入消息...">
      <div class="mediaTools">
        <button class="btn mediaBtn" id="mediaBtn" type="button" aria-label="更多功能" aria-expanded="false">+</button>
        <div class="mediaMenu hide" id="mediaMenu">
          <button type="button" data-call-kind="audio">语音通话</button>
          <button type="button" data-call-kind="video">视频通话</button>
        </div>
      </div>
      <button class="btn primary sendSubmit" type="submit">发送</button>
    </form>
    <button id="panicBtn" class="ghost" type="button">有内鬼<br>紧急关闭</button>
  </div>

  <div id="modal" class="modal" role="dialog" aria-modal="true">
    <div class="box" id="mbox"></div>
  </div>

  <script defer src="assets/js/calc.js?v=20260520-unreadcalc1"></script>
</body>
</html>
