<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="format-detection" content="telephone=no"/>
<meta name="theme-color" content="#020617"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Calculator"/>
<meta name="application-name" content="Calculator"/>
<link rel="manifest" href="/vx/manifest.webmanifest?v=enc-simple-v1"/>
<link rel="icon" type="image/png" sizes="512x512" href="/vx/vx-logo-512.png?v=enc-simple-v1"/>

<title>Calculator</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020617;color:#eaf7ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}body{position:fixed;inset:0}button,input,textarea{font:inherit}button{border:0;cursor:pointer}#calc,#app{position:fixed;inset:0}.calc{display:flex;flex-direction:column;justify-content:flex-end;padding:calc(18px + env(safe-area-inset-top)) 18px calc(16px + env(safe-area-inset-bottom));background:radial-gradient(circle at 50% -10%,rgba(56,189,248,.16),transparent 38%),radial-gradient(circle at 15% 28%,rgba(139,92,246,.13),transparent 34%),radial-gradient(circle at bottom,rgba(15,23,42,.96),#020617 72%)}#disp{flex:1;display:flex;align-items:flex-end;justify-content:flex-end;font-size:58px;font-weight:300;padding:20px 8px 28px;word-break:break-all;text-align:right;color:#fff;text-shadow:0 2px 18px rgba(56,189,248,.22)}.keys{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.k{height:72px;border-radius:23px;background:linear-gradient(180deg,rgba(55,65,81,.94),rgba(15,23,42,.96));color:white;font-size:28px;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 10px 24px rgba(0,0,0,.26)}.k:active{transform:scale(.96);opacity:.88}.fn{background:linear-gradient(180deg,#cbd5e1,#94a3b8);color:#111827}.op{background:linear-gradient(180deg,#f59e0b,#ea580c)}.zero{grid-column:span 2}
#app{display:none;background:linear-gradient(rgba(56,189,248,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.035) 1px,transparent 1px),radial-gradient(circle at 12% 8%,rgba(59,130,246,.22),transparent 30%),radial-gradient(circle at 88% 18%,rgba(139,92,246,.20),transparent 32%),#020617;background-size:34px 34px,34px 34px,auto,auto,auto}.top{position:fixed;z-index:8;left:0;right:0;top:0;height:calc(58px + env(safe-area-inset-top));padding:env(safe-area-inset-top) 10px 0;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;background:rgba(2,6,23,.82);border-bottom:1px solid rgba(56,189,248,.22);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}.left,.right{display:flex;align-items:center;gap:8px;min-width:0}.right{justify-content:flex-end}.btn{border-radius:999px;background:rgba(15,23,42,.76);color:#dff7ff;border:1px solid rgba(56,189,248,.28);padding:9px 12px;font-weight:900;white-space:nowrap}.btn:active{transform:scale(.97);opacity:.86}.primary{background:linear-gradient(135deg,#2563eb,#06b6d4);color:white;border-color:rgba(125,211,252,.35)}.danger{background:rgba(127,29,29,.72);color:#fecaca;border-color:rgba(239,68,68,.45)}.data{min-width:150px;border-radius:999px;padding:8px 10px;background:rgba(15,23,42,.78);border:1px solid rgba(34,197,94,.45);color:#dcfce7;font-size:12px;font-weight:900;white-space:nowrap;text-align:center;box-shadow:inset 0 0 18px rgba(34,197,94,.08)}.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;background:#22c55e;box-shadow:0 0 10px #22c55e}.bad{border-color:rgba(239,68,68,.45);color:#fecaca}.bad .dot{background:#ef4444;box-shadow:0 0 10px #ef4444}.main{position:fixed;left:0;right:0;top:calc(58px + env(safe-area-inset-top));bottom:calc(58px + env(safe-area-inset-bottom));overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:14px}.nav{position:fixed;z-index:8;left:0;right:0;bottom:0;height:calc(58px + env(safe-area-inset-bottom));padding:6px 10px env(safe-area-inset-bottom);display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:rgba(2,6,23,.92);border-top:1px solid rgba(56,189,248,.20);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}.nav button{border-radius:16px;background:#0f172a;color:#94a3b8;font-weight:950}.nav button.on{color:white;background:#1d4ed8}.search{display:flex;gap:8px;margin-bottom:12px}.search input,.inp,textarea,#msg{width:100%;border:1px solid rgba(56,189,248,.28);border-radius:15px;background:rgba(15,23,42,.78);color:white;padding:13px 14px;outline:0;font-size:16px}textarea{min-height:130px;resize:vertical;line-height:1.5}.card{border:1px solid rgba(56,189,248,.18);background:linear-gradient(135deg,rgba(15,23,42,.88),rgba(2,6,23,.74));border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 14px 30px rgba(0,0,0,.20),inset 0 0 22px rgba(56,189,248,.035)}.card.click{cursor:pointer}.card.click:active{transform:scale(.99)}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.title{font-weight:950;font-size:17px;color:#f8fbff}.muted{color:#94a3b8;font-size:12px;line-height:1.55;margin-top:5px;word-break:break-all}.empty{text-align:center;color:#94a3b8;padding:50px 10px;border:1px dashed rgba(56,189,248,.22);border-radius:18px;background:rgba(15,23,42,.32)}.actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}.actions button{flex:1;min-width:120px}#send{position:fixed;left:0;right:0;bottom:0;z-index:9;display:none;gap:8px;padding:9px 10px calc(9px + env(safe-area-inset-bottom));background:rgba(2,6,23,.92);border-top:1px solid rgba(56,189,248,.18);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}#send input{flex:1;border-radius:999px}#chat{padding-bottom:78px}.msg{margin:10px 0;display:flex;flex-direction:column;max-width:100%}.me{align-items:flex-end}.other{align-items:flex-start}.meta{font-size:11px;color:#94a3b8;margin:0 6px 4px}.bubble{max-width:78%;padding:11px 13px;border-radius:17px;background:#111827;border:1px solid #334155;word-break:break-word;line-height:1.45;box-shadow:0 10px 20px rgba(0,0,0,.16)}.me .bubble{background:linear-gradient(135deg,#2563eb,#06b6d4);border-top-right-radius:5px;color:white}.other .bubble{border-top-left-radius:5px;color:#e5f4ff}.modal{position:fixed;z-index:20;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.52);padding:18px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}.box{width:min(92vw,380px);border:1px solid rgba(56,189,248,.28);border-radius:22px;background:#020617;padding:17px;box-shadow:0 20px 60px rgba(0,0,0,.55)}.box h3{margin:0 0 12px;font-size:18px}.ghost{position:fixed;right:12px;top:50%;z-index:10;width:86px;height:86px;border-radius:50%;opacity:.10;background:rgba(239,68,68,.10);color:white;border:1px solid rgba(255,255,255,.18);font-weight:950;line-height:1.2}body.kb .nav{display:none}body.kb .main{bottom:0}.hide{display:none!important}
</style>
</head>
<body>
<div id="calc" class="calc"><div id="disp">0</div><div class="keys">
<button class="k fn" onclick="clr()">C</button><button class="k fn" onclick="bs()">⌫</button><button class="k fn" onclick="op('%')">%</button><button class="k op" onclick="op('/')">÷</button>
<button class="k" onclick="num('1')">1</button><button class="k" onclick="num('2')">2</button><button class="k" onclick="num('3')">3</button><button class="k op" onclick="op('*')">×</button>
<button class="k" onclick="num('4')">4</button><button class="k" onclick="num('5')">5</button><button class="k" onclick="num('6')">6</button><button class="k op" onclick="op('-')">−</button>
<button class="k" onclick="num('7')">7</button><button class="k" onclick="num('8')">8</button><button class="k" onclick="num('9')">9</button><button class="k op" onclick="op('+')">+</button>
<button class="k zero" onclick="num('0')">0</button><button class="k" onclick="dot()">.</button><button class="k op" onclick="eq()">=</button>
</div></div>

<div id="app"><header class="top"><div class="left"><button id="backBtn" class="btn hide" onclick="back()">返回</button></div><button id="dataBtn" class="data"><span class="dot"></span>数据 00:00:00</button><div class="right"><button id="newBtn" class="btn primary" onclick="newRoom()">新建房间</button><span id="roomTag" class="btn hide"></span></div></header>
<main id="main" class="main"></main>
<nav id="nav" class="nav"><button onclick="tab('hall')" id="nHall" class="on">大厅</button><button onclick="tab('ann')" id="nAnn">公告</button><button onclick="tab('me')" id="nMe">我的</button></nav>
<form id="send" onsubmit="sendMsg();return false"><input id="msg" autocomplete="off" placeholder="输入消息..." /><button class="btn primary">发送</button></form>
<button class="ghost" onclick="location.reload()">有内鬼<br>紧急关闭</button></div>
<div id="modal" class="modal"><div class="box" id="mbox"></div></div>

<script>
const CONFIG_URL="vx-config.json";
const VER="2026.05.14-enc-simple-v1";
const API="https://api.github.com",ROOM_PREFIX="VX_ROOM_V1:",MSG_PREFIX="VX_MSG_V1:",ANN_PREFIX="VX_ANN_V1:";
let appConfig=null,calcExp="",unlocked=false,admin=false,currentTab="hall",currentRoom=null,rooms=[],comments=[],announcement=null;
let deviceId=localStorage.getItem("vx_simple_device_id")||("U"+Math.random().toString(36).slice(2,10));localStorage.setItem("vx_simple_device_id",deviceId);
const $=id=>document.getElementById(id),now=()=>Date.now(),json=o=>JSON.stringify(o),fmt=t=>t?new Date(t).toLocaleString():"",safe=s=>String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
function updateDisplay(){$("disp").textContent=(calcExp||"0").replaceAll("*","×").replaceAll("/","÷").slice(-18)}function num(x){if(calcExp==="0"||calcExp==="Error")calcExp="";calcExp+=x;updateDisplay()}function op(x){if(x==="%"){tryUnlock();return}if(calcExp==="Error")calcExp="";if(!calcExp&&x!=="-")return;if("+-*/%".includes(calcExp.slice(-1)))calcExp=calcExp.slice(0,-1);calcExp+=x;updateDisplay()}function dot(){let p=calcExp.split(/[+\-*/%]/).pop();if(!p.includes(".")){calcExp+=p?".":"0.";updateDisplay()}}function clr(){calcExp="";updateDisplay()}function bs(){calcExp=calcExp.slice(0,-1);updateDisplay()}function eq(){try{if(!calcExp)return updateDisplay();if(!/^[0-9+\-*/%. ]+$/.test(calcExp)||"+-*/%.".includes(calcExp.slice(-1)))throw 0;let r=Function('"use strict";return('+calcExp+')')();calcExp=Number.isFinite(r)?String(Number(r.toFixed(8))):"Error"}catch(e){calcExp="Error"}updateDisplay()}function tails(s){let m=String(s||"").match(/(\d+)$/);if(!m)return[];let t=m[1].slice(-6),a=[];for(let i=0;i<t.length;i++)a.push(t.slice(i));return a}
function b64ToBytes(b){let bin=atob(b),a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a}
async function deriveKey(p,salt){let base=await crypto.subtle.importKey("raw",new TextEncoder().encode(p),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:180000,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"])}
async function decryptBundle(code,bundle){let enc=bundle.encryptedConfig||bundle;let key=await deriveKey(code,b64ToBytes(enc.salt));let data=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(enc.iv)},key,b64ToBytes(enc.data));return JSON.parse(new TextDecoder().decode(data))}
async function loadConfig(){let r=await fetch(CONFIG_URL+"?t="+Date.now(),{cache:"no-store"});if(!r.ok)throw Error("配置读取失败");return r.json()}
async function tryUnlock(){let list=tails(calcExp);if(!list.length)return;try{let bundle=await loadConfig();for(const c of list){try{let cfg=await decryptBundle(c,bundle);if(cfg&&cfg.token&&cfg.gistId){appConfig={token:cfg.token,gistId:cfg.gistId,adminPassword:cfg.adminPassword||cfg.admin||"",roomChars:cfg.roomChars||"ABCDEFGHJKLMNPQRSTUVWXYZ23456789"};openApp();return}}catch(e){}}}catch(e){}}
function openApp(){$("calc").style.display="none";$("app").style.display="block";unlocked=true;startApp()}
function headers(extra={}){return{"Accept":"application/vnd.github+json","Authorization":"Bearer "+appConfig.token,"X-GitHub-Api-Version":"2022-11-28",...extra}}async function api(path,opt={}){const r=await fetch(API+path,{...opt,headers:headers(opt.headers||{})});if(!r.ok){let m="请求失败："+r.status;try{let d=await r.json();if(d.message)m+=" - "+d.message}catch(e){}throw Error(m)}return r.status===204?null:r.json()}async function loadComments(){comments=[];let p=1;while(1){let a=await api(`/gists/${encodeURIComponent(appConfig.gistId)}/comments?per_page=100&page=${p++}&t=${Date.now()}`,{cache:"no-store"});comments.push(...a);if(a.length<100)break}return comments}async function postComment(body){return api(`/gists/${encodeURIComponent(appConfig.gistId)}/comments`,{method:"POST",headers:{"Content-Type":"application/json"},body:json({body})})}async function deleteComment(id){return api(`/gists/${encodeURIComponent(appConfig.gistId)}/comments/${id}`,{method:"DELETE"})}
function parseData(){rooms=[];announcement=null;for(const c of comments){let b=c.body||"";try{if(b.startsWith(ROOM_PREFIX)){let r=JSON.parse(b.slice(ROOM_PREFIX.length));r.commentId=c.id;rooms.push(r)}else if(b.startsWith(ANN_PREFIX)){let a=JSON.parse(b.slice(ANN_PREFIX.length));a.commentId=c.id;if(!announcement||Number(a.time||0)>Number(announcement.time||0))announcement=a}}catch(e){}}rooms.sort((a,b)=>(Number(b.updatedAt||b.createdAt||0)-Number(a.updatedAt||a.createdAt||0)))}async function refresh(){try{$("dataBtn").classList.remove("bad");await loadComments();parseData();if(currentRoom)renderChat();else if(currentTab==="hall")renderHall();else if(currentTab==="ann")renderAnnouncement();else if(currentTab==="me")renderMe()}catch(e){$("dataBtn").classList.add("bad")}}
function startApp(){tick();setInterval(tick,1000);refresh();setInterval(()=>unlocked&&refresh(),7000);tab("hall");window.addEventListener("focusin",()=>document.body.classList.add("kb"));window.addEventListener("focusout",()=>setTimeout(()=>document.body.classList.remove("kb"),200))}function tick(){let t=new Date().toTimeString().slice(0,8);$("dataBtn").innerHTML=`<span class="dot"></span>数据 ${t}${currentRoom?" 在线1":""}`}
function setMain(h){$("main").innerHTML=h}function setActiveNav(){$("nHall").classList.toggle("on",currentTab==="hall");$("nAnn").classList.toggle("on",currentTab==="ann");$("nMe").classList.toggle("on",currentTab==="me")}function tab(n){currentTab=n;currentRoom=null;$("send").style.display="none";$("backBtn").classList.add("hide");$("roomTag").classList.add("hide");$("newBtn").classList.toggle("hide",n!=="hall");setActiveNav();if(n==="hall")renderHall();if(n==="ann")renderAnnouncement();if(n==="me")renderMe()}function visibleRooms(){try{return JSON.parse(localStorage.getItem("vx_visible_rooms")||"[]")}catch(e){return[]}}function saveVisibleRooms(a){localStorage.setItem("vx_visible_rooms",json([...new Set(a)]))}function addVisibleRoom(no){let a=visibleRooms();if(!a.includes(no)){a.push(no);saveVisibleRooms(a)}}function roomName(r){return r.name||r.no}
function renderHall(){let v=new Set(visibleRooms()),list=rooms.filter(r=>v.has(r.no));setMain(`<div class="search"><input id="searchInput" placeholder="请输入房间号" autocomplete="off"/><button class="btn primary" onclick="searchRoom()">搜索</button></div>${list.length?list.map(r=>roomCard(r,false)).join(""):`<div class="empty">暂无房间</div>`}`)}
function roomCard(r,isAdmin){return `<div class="card click" onclick="enterRoom('${safe(r.no)}',${isAdmin})"><div class="row"><div><div class="title">${safe(r.no)}</div><div class="muted">${safe(roomName(r))} · ${fmt(r.createdAt)}</div></div></div>${isAdmin?`<div class="actions" onclick="event.stopPropagation()"><button class="btn danger" onclick="clearRoom('${safe(r.no)}')">清空聊天记录</button><button class="btn danger" onclick="deleteRoom('${safe(r.no)}')">删除房间</button></div>`:""}</div>`}
async function searchRoom(){let q=($("searchInput").value||"").trim();if(!q)return;if(q===appConfig.adminPassword){admin=true;toast("管理员模式已开启");tab("me");return}let r=rooms.find(x=>String(x.no).toUpperCase()===q.toUpperCase());if(!r)return toast("未找到房间");let pw=prompt("请输入房间密码");if(pw!==r.password)return toast("未找到房间");addVisibleRoom(r.no);enterRoom(r.no,false)}
function genRoomNo(){let s="",chars=appConfig.roomChars||"ABCDEFGHJKLMNPQRSTUVWXYZ23456789";for(let i=0;i<6;i++)s+=chars[Math.floor(Math.random()*chars.length)];return s}async function newRoom(){let password=prompt("请设置房间密码");if(!password)return;let no;do{no=genRoomNo()}while(rooms.some(r=>r.no===no));let room={no,password,name:no,createdAt:now(),updatedAt:now(),owner:deviceId};await postComment(ROOM_PREFIX+json(room));addVisibleRoom(no);await refresh();enterRoom(no,false)}
function renderAnnouncement(){if(admin){setMain(`<div class="card"><div class="title">公告管理</div><div class="muted">管理员发布后，普通用户刷新或在线轮询后会及时看到。</div><input class="inp" id="annTitle" placeholder="公告标题" value="${safe(announcement?.title||"系统公告")}" style="margin-top:12px"/><textarea id="annContent" placeholder="公告内容">${safe(announcement?.content||"")}</textarea><div class="actions"><button class="btn primary" onclick="saveAnnouncement()">发布公告</button><button class="btn danger" onclick="clearAnnouncement()">清空公告</button></div></div>`)}else{setMain(`<div class="card"><div class="title">${safe(announcement?.title||"公告")}</div><div style="line-height:1.7;margin-top:12px">${announcement?.content?safe(announcement.content).replace(/\n/g,"<br>"):"暂无公告，谢谢使用。"}</div><div class="muted">${announcement?.time?fmt(announcement.time):""}</div></div>`)}}
async function saveAnnouncement(){for(const c of comments)if((c.body||"").startsWith(ANN_PREFIX))await deleteComment(c.id);await postComment(ANN_PREFIX+json({title:($("annTitle").value||"系统公告").trim(),content:($("annContent").value||"").trim(),time:now()}));await refresh();toast("公告已发布")}async function clearAnnouncement(){if(!confirm("确认清空公告？"))return;for(const c of comments)if((c.body||"").startsWith(ANN_PREFIX))await deleteComment(c.id);await refresh()}
function renderMe(){if(!admin){setMain(`<div class="empty">谢谢使用！</div>`);return}setMain(`<div class="card"><div class="title">管理后台</div><div class="muted">当前版本：${VER}</div><div class="muted">所有房间：${rooms.length}</div><div class="muted">点击房间卡片可直接免密进入。</div></div>${rooms.length?rooms.map(r=>roomCard(r,true)).join(""):`<div class="empty">暂无房间</div>`}`)}
function getMessages(no){let arr=[],pre=MSG_PREFIX+no+":";for(const c of comments){let b=c.body||"";if(!b.startsWith(pre))continue;try{let m=JSON.parse(b.slice(pre.length));m.commentId=c.id;arr.push(m)}catch(e){}}return arr.sort((a,b)=>Number(a.time||0)-Number(b.time||0))}function enterRoom(no,isAdmin){let r=rooms.find(x=>x.no===no);if(!r)return;currentRoom=r;$("backBtn").classList.remove("hide");$("roomTag").classList.remove("hide");$("roomTag").textContent=r.no;$("newBtn").classList.add("hide");$("send").style.display="flex";renderChat();setTimeout(()=>$("main").scrollTop=$("main").scrollHeight,80)}function renderChat(){if(!currentRoom)return;let list=getMessages(currentRoom.no);setMain(`<div id="chat">${list.map(m=>`<div class="msg ${m.sender===deviceId?"me":"other"}"><div class="meta">${m.sender===deviceId?"我":"用户"}</div><div class="bubble">${safe(m.text)}</div></div>`).join("")}</div>`);tick()}function back(){currentRoom=null;$("send").style.display="none";$("backBtn").classList.add("hide");$("roomTag").classList.add("hide");if(admin&&currentTab==="me"){renderMe();return}tab("hall")}async function sendMsg(){let text=($("msg").value||"").trim();if(!text||!currentRoom)return;$("msg").value="";await postComment(MSG_PREFIX+currentRoom.no+":"+json({sender:deviceId,text,time:now()}));await refresh();setTimeout(()=>$("main").scrollTop=$("main").scrollHeight,80)}
async function clearRoom(no){if(!confirm("确认清空该房间聊天记录？"))return;let pre=MSG_PREFIX+no+":";for(const c of comments)if((c.body||"").startsWith(pre))await deleteComment(c.id);await refresh();toast("已清空")}async function deleteRoom(no){if(!confirm("确认删除该房间？"))return;let pre=MSG_PREFIX+no+":";for(const c of comments){let b=c.body||"";if(b.startsWith(pre))await deleteComment(c.id);if(b.startsWith(ROOM_PREFIX)){try{if(JSON.parse(b.slice(ROOM_PREFIX.length)).no===no)await deleteComment(c.id)}catch(e){}}}saveVisibleRooms(visibleRooms().filter(x=>x!==no));currentRoom=null;await refresh();tab("me")}function toast(t){$("mbox").innerHTML=`<h3>${safe(t)}</h3><div class="actions"><button class="btn primary" onclick="$('modal').style.display='none'">确定</button></div>`;$("modal").style.display="flex"}$("modal").onclick=e=>{if(e.target.id==="modal")e.target.style.display="none"}
</script>
</body>
</html>
