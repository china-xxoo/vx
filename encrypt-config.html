<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>VX 配置生成器</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e5f3ff;
      background:
        radial-gradient(circle at top left, rgba(0, 180, 255, .22), transparent 32%),
        radial-gradient(circle at top right, rgba(139, 92, 246, .22), transparent 28%),
        linear-gradient(135deg, #061526, #0a1021 45%, #120d2b);
    }
    body { padding: 22px 14px 46px; }
    .wrap { width: min(760px, 100%); margin: 0 auto; }
    h1 {
      text-align: center;
      margin: 6px 0 8px;
      font-size: 26px;
      letter-spacing: .04em;
      color: #fff;
      text-shadow: 0 0 18px rgba(80, 220, 255, .5);
    }
    .sub {
      text-align: center;
      color: rgba(229,243,255,.78);
      font-size: 13px;
      margin-bottom: 18px;
    }
    .notice {
      border: 1px solid rgba(251, 191, 36, .38);
      background: rgba(251, 191, 36, .08);
      color: #ffe6a6;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.55;
      margin-bottom: 16px;
    }
    .card {
      background: rgba(5, 18, 36, .78);
      border: 1px solid rgba(103, 232, 249, .18);
      box-shadow: 0 22px 70px rgba(0,0,0,.32), inset 0 0 28px rgba(80, 220, 255, .04);
      border-radius: 22px;
      padding: 16px;
      margin-bottom: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .section-title {
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      margin: 0 0 14px;
    }
    label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 800;
      color: rgba(229,243,255,.88);
      font-size: 13px;
      margin: 14px 0 7px;
    }
    .hint { color: rgba(229,243,255,.48); font-weight: 700; font-size: 12px; }
    input, textarea {
      width: 100%;
      border: 1px solid rgba(103, 232, 249, .20);
      border-radius: 14px;
      outline: none;
      background: rgba(2, 8, 23, .72);
      color: #fff;
      padding: 13px 14px;
      font-size: 14px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
    }
    input:focus, textarea:focus {
      border-color: rgba(103, 232, 249, .6);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, .12);
    }
    textarea {
      min-height: 230px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.55;
    }
    .unlock-box {
      border-radius: 18px;
      padding: 14px;
      background: linear-gradient(180deg, rgba(2, 8, 23, .68), rgba(15, 23, 42, .58));
      border: 1px solid rgba(103, 232, 249, .18);
    }
    .calc-display {
      width: 100%;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      border-radius: 16px;
      padding: 13px 14px;
      background: rgba(0, 0, 0, .28);
      border: 1px solid rgba(255,255,255,.10);
      color: #fff;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: .08em;
      overflow-x: auto;
      white-space: nowrap;
    }
    .standard-row {
      margin-top: 8px;
      color: #7dd3fc;
      font-size: 12px;
      font-weight: 800;
      word-break: break-all;
    }
    .keypad {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .key {
      height: 54px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 16px;
      color: #f8fbff;
      background: rgba(255,255,255,.09);
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,.20);
      user-select: none;
    }
    .key:active { transform: scale(.97); opacity: .82; }
    .key.danger { color: #fecaca; background: rgba(239,68,68,.16); border-color: rgba(248,113,113,.30); }
    .key.equal { color: #020617; background: linear-gradient(135deg, #67e8f9, #a78bfa); }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .btn {
      border: none;
      border-radius: 16px;
      padding: 15px 16px;
      font-weight: 900;
      font-size: 15px;
      cursor: pointer;
      color: #061526;
      background: linear-gradient(135deg, #67e8f9, #a78bfa);
      box-shadow: 0 12px 32px rgba(96,165,250,.25);
    }
    .btn.secondary {
      background: rgba(255,255,255,.10);
      color: #e5f3ff;
      border: 1px solid rgba(255,255,255,.12);
    }
    .btn:active { transform: scale(.99); opacity: .9; }
    .copied {
      text-align: center;
      color: #86efac;
      font-size: 13px;
      margin-top: 10px;
      font-weight: 900;
      min-height: 18px;
    }
    .small {
      color: rgba(229,243,255,.56);
      font-size: 12px;
      line-height: 1.55;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>VX 配置生成器</h1>
    <div class="sub">只在当前浏览器本地生成配置，不上传任何信息。</div>

    <div class="notice">
      新规则：进入暗号只允许 <b>1-6 位数字</b>。index 页面中，只有计算器显示 <b>0</b> 时按一次 <b>=</b> 才会进入暗号模式；输入数字暗号后，再按一次 <b>=</b> 才会核对暗语。
    </div>

    <div class="card">
      <div class="section-title">基础配置</div>

      <label>进入暗号 <span class="hint">1-6位数字</span></label>
      <div class="unlock-box">
        <div class="calc-display" id="unlockDisplay">未输入</div>
        <input id="unlockCode" autocomplete="off" inputmode="numeric" maxlength="6" placeholder="输入1-6位数字，例如：9999" style="margin-top:10px;" />
        <div class="standard-row">标准化暗号：<span id="normalizedPreview">未输入</span></div>

        <div class="keypad" aria-label="数字暗号键盘">
          <button class="key" data-value="1">1</button>
          <button class="key" data-value="2">2</button>
          <button class="key" data-value="3">3</button>

          <button class="key" data-value="4">4</button>
          <button class="key" data-value="5">5</button>
          <button class="key" data-value="6">6</button>

          <button class="key" data-value="7">7</button>
          <button class="key" data-value="8">8</button>
          <button class="key" data-value="9">9</button>

          <button class="key danger" data-action="clear">C</button>
          <button class="key" data-value="0">0</button>
          <button class="key danger" data-action="back">⌫</button>
        </div>
      </div>

      <label>GitHub Token</label>
      <input id="githubToken" autocomplete="off" placeholder="github_pat_..." />

      <label>Gist ID</label>
      <input id="gistId" autocomplete="off" placeholder="Gist ID" />

      <label>聊天加密密钥 <span class="hint">chatSecret</span></label>
      <input id="chatSecret" autocomplete="off" placeholder="例如：2026" />

      <label>万能管理密码</label>
      <input id="adminPassword" type="password" autocomplete="new-password" placeholder="管理密码" />

      <button class="btn" style="width:100%; margin-top:14px;" onclick="generateConfig()">生成配置</button>
      <div class="copied" id="copiedTip"></div>
    </div>

    <div class="card">
      <div class="section-title">生成结果</div>
      <textarea id="result" readonly placeholder="生成后结果会显示在这里"></textarea>
      <div class="actions">
        <button class="btn secondary" onclick="copyResult()">复制结果</button>
        <button class="btn secondary" onclick="clearPage()">清空页面</button>
      </div>
      <div class="small">
        生成后，把结果中的 DEFAULT_ENCRYPTED_CONFIG 和 ADMIN_PASSWORD_HASH 替换到 index.html 对应位置即可。注意：这个版本只支持 1-6 位数字暗号。
      </div>
    </div>
  </div>

  <script>
    const PBKDF2_ITERATIONS = 180000;

    function normalizeUnlockCode(input) {
      return String(input || "").replace(/\D/g, "").slice(0, 6);
    }

    function validateUnlockCode(input) {
      const code = normalizeUnlockCode(input);

      if (!code) {
        throw new Error("请输入进入暗号");
      }

      if (!/^\d{1,6}$/.test(code)) {
        throw new Error("进入暗号只能是1-6位数字");
      }

      return code;
    }

    function updateUnlockUI() {
      const input = document.getElementById("unlockCode");
      const display = document.getElementById("unlockDisplay");
      const preview = document.getElementById("normalizedPreview");
      const normalized = normalizeUnlockCode(input.value);

      input.value = normalized;
      display.textContent = normalized || "未输入";
      preview.textContent = normalized || "未输入";
    }

    document.getElementById("unlockCode").addEventListener("input", updateUnlockUI);

    document.querySelectorAll(".key").forEach(btn => {
      btn.addEventListener("click", () => {
        const input = document.getElementById("unlockCode");
        const value = btn.dataset.value;
        const action = btn.dataset.action;

        if (action === "clear") {
          input.value = "";
        } else if (action === "back") {
          input.value = input.value.slice(0, -1);
        } else if (value && input.value.length < 6) {
          input.value += value;
        }

        updateUnlockUI();
      });
    });

    function utf8ToBytes(str) {
      return new TextEncoder().encode(str);
    }

    function bytesToBase64(bytes) {
      let binary = "";
      const arr = new Uint8Array(bytes);
      for (let i = 0; i < arr.length; i++) {
        binary += String.fromCharCode(arr[i]);
      }
      return btoa(binary);
    }

    function bufferToHex(buffer) {
      return Array.from(new Uint8Array(buffer))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
    }

    async function sha256Hex(text) {
      const digest = await crypto.subtle.digest("SHA-256", utf8ToBytes(text));
      return bufferToHex(digest);
    }

    async function deriveKey(unlockCode, saltBytes) {
      const baseKey = await crypto.subtle.importKey(
        "raw",
        utf8ToBytes(unlockCode),
        "PBKDF2",
        false,
        ["deriveKey"]
      );

      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: saltBytes,
          iterations: PBKDF2_ITERATIONS,
          hash: "SHA-256"
        },
        baseKey,
        {
          name: "AES-GCM",
          length: 256
        },
        false,
        ["encrypt", "decrypt"]
      );
    }

    async function encryptConfig(unlockCode, configObject) {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveKey(unlockCode, salt);
      const plaintext = utf8ToBytes(JSON.stringify(configObject));
      const encrypted = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv },
        key,
        plaintext
      );

      return {
        salt: bytesToBase64(salt),
        iv: bytesToBase64(iv),
        data: bytesToBase64(encrypted)
      };
    }

    async function generateConfig() {
      const tip = document.getElementById("copiedTip");
      tip.textContent = "";

      try {
        const unlockCode = validateUnlockCode(document.getElementById("unlockCode").value);
        const githubToken = document.getElementById("githubToken").value.trim();
        const gistId = document.getElementById("gistId").value.trim();
        const chatSecret = document.getElementById("chatSecret").value.trim();
        const adminPassword = document.getElementById("adminPassword").value;

        if (!githubToken) throw new Error("请输入 GitHub Token");
        if (!gistId) throw new Error("请输入 Gist ID");
        if (!chatSecret) throw new Error("请输入聊天加密密钥");
        if (!adminPassword) throw new Error("请输入万能管理密码");

        const encrypted = await encryptConfig(unlockCode, {
          githubToken,
          gistId,
          chatSecret
        });

        const adminHash = await sha256Hex(adminPassword);

        const output =
`const DEFAULT_ENCRYPTED_CONFIG = ${JSON.stringify(encrypted, null, 2)};

const ADMIN_PASSWORD_HASH = "${adminHash}";`;

        document.getElementById("result").value = output;

        await navigator.clipboard.writeText(output).catch(() => {});
        tip.textContent = "已生成并尝试复制";
      } catch (err) {
        tip.textContent = err.message || "生成失败";
      }
    }

    async function copyResult() {
      const text = document.getElementById("result").value;
      if (!text) return;
      await navigator.clipboard.writeText(text).catch(() => {});
      document.getElementById("copiedTip").textContent = "已复制";
    }

    function clearPage() {
      document.getElementById("unlockCode").value = "";
      document.getElementById("githubToken").value = "";
      document.getElementById("gistId").value = "";
      document.getElementById("chatSecret").value = "";
      document.getElementById("adminPassword").value = "";
      document.getElementById("result").value = "";
      document.getElementById("copiedTip").textContent = "";
      updateUnlockUI();
    }

    updateUnlockUI();
  </script>
</body>
</html>
