<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>VX 配置生成器</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#020617;color:#eaf7ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;padding:18px}
    .wrap{max-width:760px;margin:auto}
    .card{border:1px solid rgba(56,189,248,.25);background:#0f172acc;border-radius:10px;padding:16px;margin:14px 0}
    h1{text-align:center}
    label{display:block;font-weight:900;margin:12px 0 6px}
    input,textarea{width:100%;border:1px solid rgba(56,189,248,.35);border-radius:10px;background:#020617;color:white;padding:12px;font-size:15px}
    textarea{min-height:260px;font-family:ui-monospace,Menlo,Consolas,monospace}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btn{border:0;border-radius:12px;background:linear-gradient(135deg,#2563eb,#06b6d4);color:white;padding:13px 16px;font-weight:900;width:100%;margin-top:14px}
    .btn.secondary{background:#1f2937}
    .muted{color:#94a3b8;font-size:13px;line-height:1.6}
    .ok{color:#86efac;font-weight:900}
    .bad{color:#fecaca;font-weight:900}
    @media (max-width:640px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>VX 配置生成器</h1>
    <div class="card">
      <div class="muted">当前上传目录里只需要保留加密后的 vx-config.json。需要更新配置时，输入暗语后可以读取现有加密配置并重新生成。</div>
      <label>进入暗语 1-6位数字</label>
      <input id="unlock" inputmode="numeric" maxlength="6" placeholder="例如 5555">
      <div class="row">
        <button class="btn secondary" type="button" id="loadBtn">读取现有配置</button>
        <button class="btn" type="button" id="makeBtn">生成 vx-config.json</button>
      </div>
      <label>GitHub Token</label>
      <input id="token" type="password" placeholder="github_pat_...">
      <label>聊天数据 Gist ID</label>
      <input id="gist" placeholder="Gist ID">
      <label>管理密码</label>
      <input id="admin" placeholder="管理员入口密码">
      <label>MQTT WebSocket 地址</label>
      <input id="mqttUrl" placeholder="wss://.../mqtt">
      <label>MQTT 用户名</label>
      <input id="mqttUser" placeholder="MQTT username">
      <label>MQTT 密码</label>
      <input id="mqttPass" type="password" placeholder="MQTT password">
      <label>MQTT Topic 前缀</label>
      <input id="mqttPrefix" value="vx/app/calcchat/v1">
      <label>房间号字符集</label>
      <input id="roomChars" value="ABCDEFGHJKLMNPQRSTUVWXYZ23456789">
      <div id="tip" class="ok"></div>
    </div>
    <div class="card">
      <label>生成结果：复制全部内容到 vx-config.json</label>
      <textarea id="out" readonly></textarea>
      <button class="btn" type="button" id="copyBtn">复制结果</button>
    </div>
  </div>

  <script>
    const enc = new TextEncoder();
    const dec = new TextDecoder();

    function value(id) {
      return document.getElementById(id).value.trim();
    }

    function setValue(id, val) {
      document.getElementById(id).value = val || "";
    }

    function bytesToB64(bytes) {
      let text = "";
      const data = new Uint8Array(bytes);
      for (let i = 0; i < data.length; i += 1) text += String.fromCharCode(data[i]);
      return btoa(text);
    }

    function b64ToBytes(value) {
      const raw = atob(value);
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i += 1) bytes[i] = raw.charCodeAt(i);
      return bytes;
    }

    async function key(password, salt, usage) {
      const base = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations: 180000, hash: "SHA-256" },
        base,
        { name: "AES-GCM", length: 256 },
        false,
        [usage]
      );
    }

    async function decryptConfig(unlock, payload) {
      const encrypted = payload.encryptedConfig || payload;
      const aes = await key(unlock, b64ToBytes(encrypted.salt), "decrypt");
      const plain = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: b64ToBytes(encrypted.iv) },
        aes,
        b64ToBytes(encrypted.data)
      );
      return JSON.parse(dec.decode(plain));
    }

    async function encryptConfig(unlock, cfg) {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const aes = await key(unlock, salt, "encrypt");
      const data = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, aes, enc.encode(JSON.stringify(cfg)));
      return {
        type: "VX_REMOTE_CONFIG_V1",
        version: 2,
        storage: "encrypted_repo_file",
        unlockRule: "percent_tail_suffix_numeric_1_6",
        realtime: "mqtt",
        history: "gist_comments",
        updatedAt: new Date().toISOString(),
        encryptedConfig: {
          salt: bytesToB64(salt),
          iv: bytesToB64(iv),
          data: bytesToB64(data)
        }
      };
    }

    function checkUnlock() {
      const unlock = value("unlock").replace(/\D/g, "").slice(0, 6);
      setValue("unlock", unlock);
      if (!/^\d{1,6}$/.test(unlock)) throw new Error("暗语必须是1-6位数字");
      return unlock;
    }

    async function loadExisting() {
      try {
        const unlock = checkUnlock();
        const response = await fetch("vx-config.json?t=" + Date.now(), { cache: "no-store" });
        const payload = await response.json();
        const cfg = await decryptConfig(unlock, payload);
        setValue("token", cfg.token);
        setValue("gist", cfg.gistId);
        setValue("admin", cfg.adminPassword);
        setValue("mqttUrl", cfg.mqttUrl);
        setValue("mqttUser", cfg.mqttUser);
        setValue("mqttPass", cfg.mqttPass);
        setValue("mqttPrefix", cfg.mqttPrefix || "vx/app/calcchat/v1");
        setValue("roomChars", cfg.roomChars || "ABCDEFGHJKLMNPQRSTUVWXYZ23456789");
        tip("已读取现有加密配置。", false);
      } catch (error) {
        tip(error.message || "读取失败，请确认暗语和 vx-config.json。", true);
      }
    }

    async function make() {
      try {
        const unlock = checkUnlock();
        const token = value("token");
        const gistId = value("gist");
        const adminPassword = value("admin");
        if (!token || !gistId || !adminPassword) throw new Error("请填完整 Token / Gist ID / 管理密码");
        const cfg = {
          token,
          gistId,
          adminPassword,
          roomChars: value("roomChars") || "ABCDEFGHJKLMNPQRSTUVWXYZ23456789",
          mqttUrl: value("mqttUrl"),
          mqttUser: value("mqttUser"),
          mqttPass: value("mqttPass"),
          mqttPrefix: value("mqttPrefix") || "vx/app/calcchat/v1",
          savedAt: new Date().toISOString()
        };
        const payload = await encryptConfig(unlock, cfg);
        document.getElementById("out").value = JSON.stringify(payload, null, 2);
        tip("已生成，请复制到 vx-config.json。", false);
      } catch (error) {
        tip(error.message || "生成失败。", true);
      }
    }

    async function copyOut() {
      const out = document.getElementById("out");
      out.select();
      await navigator.clipboard.writeText(out.value);
      tip("已复制。", false);
    }

    function tip(text, bad) {
      const node = document.getElementById("tip");
      node.textContent = text;
      node.className = bad ? "bad" : "ok";
    }

    document.getElementById("loadBtn").addEventListener("click", loadExisting);
    document.getElementById("makeBtn").addEventListener("click", make);
    document.getElementById("copyBtn").addEventListener("click", copyOut);
  </script>
</body>
</html>
