<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/><title>VX配置生成器</title>
<style>*{box-sizing:border-box}body{margin:0;background:#020617;color:#eaf7ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;padding:18px}.wrap{max-width:760px;margin:auto}.card{border:1px solid rgba(56,189,248,.25);background:#0f172acc;border-radius:18px;padding:16px;margin:14px 0}h1{text-align:center}label{display:block;font-weight:900;margin:12px 0 6px}input,textarea{width:100%;border:1px solid rgba(56,189,248,.35);border-radius:12px;background:#020617;color:white;padding:12px;font-size:15px}textarea{min-height:260px;font-family:ui-monospace,Menlo,Consolas,monospace}.btn{border:0;border-radius:14px;background:linear-gradient(135deg,#2563eb,#06b6d4);color:white;padding:13px 16px;font-weight:900;width:100%;margin-top:14px}.muted{color:#94a3b8;font-size:13px;line-height:1.6}.ok{color:#86efac;font-weight:900}</style></head><body><div class="wrap"><h1>VX 配置生成器</h1><div class="card"><div class="muted">这里会把 GitHub Token、聊天 Gist ID、管理密码加密成 vx-config.json。index.html 不再出现明文 Token。</div>
<label>进入暗语 1-6位数字</label><input id="unlock" inputmode="numeric" maxlength="6" placeholder="例如 5555">
<label>GitHub Token</label><input id="token" type="password" placeholder="github_pat_...">
<label>聊天数据 Gist ID</label><input id="gist" value="250bbdfbad8be04672e0ae85300a23f2">
<label>管理密码</label><input id="admin" placeholder="例如 39793107900">
<button class="btn" onclick="make()">生成 vx-config.json</button><div id="tip" class="ok"></div></div>
<div class="card"><label>生成结果：复制全部内容到 vx-config.json</label><textarea id="out" readonly></textarea><button class="btn" onclick="copy()">复制结果</button></div></div>
<script>
function bytesToB64(bytes){let s="",a=new Uint8Array(bytes);for(let i=0;i<a.length;i++)s+=String.fromCharCode(a[i]);return btoa(s)}
function encText(s){return new TextEncoder().encode(s)}
async function deriveKey(p,salt){let base=await crypto.subtle.importKey("raw",encText(p),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:180000,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["encrypt"])}
async function make(){let unlock=unlockCode();let token=val("token"),gist=val("gist"),admin=val("admin");if(!/^\d{1,6}$/.test(unlock))return alert("暗语必须是1-6位数字");if(!token||!gist||!admin)return alert("请填完整");let salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12)),key=await deriveKey(unlock,salt);let cfg={token,gistId:gist,adminPassword:admin,roomChars:"ABCDEFGHJKLMNPQRSTUVWXYZ23456789",savedAt:new Date().toISOString()};let data=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,encText(JSON.stringify(cfg)));let out={type:"VX_REMOTE_CONFIG_V1",version:1,storage:"encrypted_repo_file",unlockRule:"percent_tail_suffix_numeric_1_6",updatedAt:new Date().toISOString(),encryptedConfig:{salt:bytesToB64(salt),iv:bytesToB64(iv),data:bytesToB64(data)}};document.getElementById("out").value=JSON.stringify(out,null,2);document.getElementById("tip").textContent="已生成，请复制到仓库 vx-config.json";}
function unlockCode(){return val("unlock").replace(/\D/g,"").slice(0,6)}function val(id){return document.getElementById(id).value.trim()}async function copy(){let t=document.getElementById("out");t.select();await navigator.clipboard.writeText(t.value);alert("已复制");}
</script></body></html>
